<!DOCTYPE html>

<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Logic Circuit Tool</title>

<style>
body{
    margin:0;
    font-family:sans-serif;
}

.toolbar{
    padding:10px;
    background:#eee;
}

button{
    margin-right:5px;
}

#canvas{
    width:100%;
    height:90vh;
    background:white;
    position:relative;
    overflow:hidden;
}

.gate{
    width:80px;
    height:50px;
    border:2px solid black;
    position:absolute;
    cursor:move;
    display:flex;
    justify-content:center;
    align-items:center;
    background:white;
}
</style>

</head>

<body>

<div class="toolbar">
    <button onclick="addGate('AND')">AND</button>
    <button onclick="addGate('OR')">OR</button>
    <button onclick="addGate('NOT')">NOT</button>
</div>

<div id="canvas"></div>

<script src="script.js"></script>

</body>
</html>
